{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'contacts/css/styles.css' %}">
    <meta charset="UTF-8">
    <title>{% block title %}QuickContact QR{% endblock %}</title>
</head>
<body>
    <header>
        <h1>
            <a href="{% url 'contacts:home' %}">QuickContact QR</a>
        </h1>

        <nav>
            <a href="{% url 'contacts:create_contact' %}">Create QR</a>
            <a href="{% url 'contacts:privacy' %}">Privacy</a>
        </nav>

        <hr>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <hr>

    <footer>
        <p>
            Privacy-first contact QR generator. Your details are not stored by this app.
        </p>
    </footer>
</body>
</html>
