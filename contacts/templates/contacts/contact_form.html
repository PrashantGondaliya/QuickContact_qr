{% extends "base.html" %}

{% block title %}Create Contact QR{% endblock %}

{% block content %}
    <h2>Create your contact QR code</h2>

    <p>
        Your data is not stored. It will only be used to generate your QR code.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Generate QR code</button>
    </form>
{% endblock %}
