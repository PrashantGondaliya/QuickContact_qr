<!DOCTYPE html>
<html>
<head>
    <title>Create Contact QR</title>
</head>
<body>
    <h1>Create your contact QR code</h1>

    <p>
        Your data is not stored. It will only be used to generate your QR code.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Generate QR code</button>
    </form>

    <p>
        <a href="{% url 'contacts:home' %}">Back to home</a>
    </p>
</body>
</html>
